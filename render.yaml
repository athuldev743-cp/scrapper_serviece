services:
  - type: web
    name: design-scraper
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m scraper_service.main
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

        
        Invoke-WebRequest "h/" | Select-Object -ExpandProperty Content
        Invoke-WebRequest "https://scrapper-serviece.onrender.com/design-brief?keyword=todo+app" | Select-Object -ExpandProperty Content